apiVersion: apps/v1
kind: Deployment
metadata:
  name: neww-aquasense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neww-aquasense
  template:
    metadata:
      labels:
        app: neww-aquasense
    spec:
      containers:
      - name: neww-aquasense
        image: sahanaarums16/neww-aquasense:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: neww-aquasense-service
spec:
  type: NodePort
  selector:
    app: neww-aquasense
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007